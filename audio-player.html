<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Player - Derrick Files</title>
  <style>
    :root {
      --gold: #F5A623;
      --gold2: #E8820C;
      --black: #050505;
      --dark: #0C0C0C;
      --card: #111;
      --card2: #181818;
      --border: #1E1E1E;
      --border2: rgba(245, 166, 35, 0.2);
      --text: #F0F0F0;
      --muted: #555;
      --muted2: #888;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px;
    }

    .audio-player-container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ═══ HEADER ═══ */
    .ap-header {
      margin-bottom: 32px;
    }

    .ap-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
      display: block;
    }

    .ap-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      line-height: 1;
    }

    .ap-title span {
      color: var(--gold);
    }

    .ap-desc {
      font-size: 0.9rem;
      color: var(--muted2);
      max-width: 600px;
      line-height: 1.6;
    }

    /* ═══ STATUS BADGE ═══ */
    .status-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 12px;
      background: rgba(48, 209, 88, 0.1);
      border: 1px solid rgba(48, 209, 88, 0.3);
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #30D158;
    }

    .status-badge.loading {
      background: rgba(245, 166, 35, 0.1);
      border-color: rgba(245, 166, 35, 0.3);
      color: var(--gold);
    }

    /* ═══ PLAYER MAIN ═══ */
    .ap-player {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 28px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .ap-player::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* Now Playing Display */
    .now-playing {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      align-items: flex-start;
    }

    .np-cover {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, rgba(245, 166, 35, 0.15), var(--dark));
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .np-cover.playing {
      animation: coverPulse 2s ease-in-out infinite;
    }

    @keyframes coverPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245, 166, 35, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(245, 166, 35, 0); }
    }

    .np-cover svg {
      width: 44px;
      height: 44px;
      opacity: 0.4;
      fill: var(--gold);
    }

    .np-cover.loaded {
      background-size: cover;
      background-position: center;
    }

    .np-info {
      flex: 1;
      min-width: 0;
    }

    .np-track {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .np-artist {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .np-time {
      display: flex;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted2);
    }

    /* Progress Bar */
    .progress-section {
      margin-bottom: 24px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width 0.1s linear;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .play-btn {
      width: 48px;
      height: 48px;
      background: var(--gold);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .play-btn:hover {
      background: #fff;
      transform: scale(1.05);
    }

    .play-btn svg {
      width: 20px;
      height: 20px;
      fill: var(--black);
    }

    .control-btn {
      width: 38px;
      height: 38px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .control-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .control-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .volume-slider {
      width: 100px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border);
      outline: none;
      border-radius: 2px;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: var(--gold);
      cursor: pointer;
      border-radius: 50%;
    }

    .volume-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: var(--gold);
      cursor: pointer;
      border-radius: 50%;
      border: none;
    }

    /* Visualizer */
    .visualizer {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 32px;
      margin-bottom: 24px;
    }

    .visualizer-bar {
      flex: 1;
      background: linear-gradient(180deg, var(--gold), var(--gold2));
      border-radius: 2px;
      height: 8px;
      opacity: 0.6;
      animation: visualizerPulse 0.4s ease-in-out infinite;
    }

    @keyframes visualizerPulse {
      0%, 100% { height: 8px; }
      50% { height: 24px; }
    }

    /* ═══ PLAYLISTS ═══ */
    .ap-playlists {
      margin-top: 40px;
    }

    .ap-playlists-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    .playlist-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .playlist-tab {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 14px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted2);
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 4px;
    }

    .playlist-tab.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(245, 166, 35, 0.08);
    }

    .playlist-tab:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .tracks-list {
      display: none;
    }

    .tracks-list.active {
      display: block;
    }

    .track-item {
      background: var(--card2);
      border: 1px solid var(--border);
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
    }

    .track-item:hover {
      border-color: var(--gold);
      background: var(--card);
    }

    .track-item.playing {
      border-color: var(--gold);
      background: rgba(245, 166, 35, 0.08);
    }

    .track-number {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      min-width: 30px;
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-name {
      font-size: 0.9rem;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track-artist {
      font-size: 0.75rem;
      color: var(--muted2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track-duration {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .track-play-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      opacity: 0;
    }

    .track-item:hover .track-play-icon {
      opacity: 1;
    }

    .track-item.playing .track-play-icon {
      opacity: 1;
    }

    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(245, 166, 35, 0.3);
      border-top: 2px solid var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .ap-player {
        padding: 16px;
      }

      .now-playing {
        flex-direction: column;
        gap: 12px;
      }

      .np-cover {
        width: 80px;
        height: 80px;
      }

      .volume-control {
        margin-left: 0;
        width: 100%;
        margin-top: 12px;
      }

      .volume-slider {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="audio-player-container">
    <!-- Header -->
    <div class="ap-header">
      <span class="ap-label">Audio Platform</span>
      <h1 class="ap-title">AUDIO <span>STREAMING</span></h1>
      <p class="ap-desc">Listen to DJ mixes, production tracks, and studio sessions streamed live from Cloudflare R2.</p>
      <div class="status-badge loading" id="statusBadge">
        <span class="loading-spinner" style="margin-right: 6px; vertical-align: -2px;"></span>
        Loading playlists...
      </div>
    </div>

    <!-- Main Player -->
    <div class="ap-player">
      <!-- Now Playing -->
      <div class="now-playing">
        <div class="np-cover" id="npCover">
          <svg viewBox="0 0 24 24"><path d="M12 3v9.28a4.39 4.39 0 00-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/></svg>
        </div>
        <div class="np-info">
          <div class="np-artist" id="npArtist">Ready to Play</div>
          <div class="np-track" id="npTrack">Select a track to begin</div>
          <div class="np-time">
            <span id="currentTime">0:00</span>
            <span>/</span>
            <span id="duration">0:00</span>
          </div>
        </div>
      </div>

      <!-- Visualizer -->
      <div class="visualizer" id="visualizer" style="display: none;">
        <div class="visualizer-bar" style="animation-delay: 0s;"></div>
        <div class="visualizer-bar" style="animation-delay: 0.1s;"></div>
        <div class="visualizer-bar" style="animation-delay: 0.2s;"></div>
        <div class="visualizer-bar" style="animation-delay: 0.3s;"></div>
        <div class="visualizer-bar" style="animation-delay: 0.4s;"></div>
      </div>

      <!-- Progress -->
      <div class="progress-section">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="control-btn" id="prevBtn" title="Previous">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="play-btn" id="playBtn" title="Play">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="control-btn" id="nextBtn" title="Next">
          <svg viewBox="0 0 24 24"><path d="M16 18h2V6h-2zm-11-7l8.5-6v12z"/></svg>
        </button>

        <div class="volume-control">
          <svg style="width: 16px; height: 16px; fill: var(--muted2);" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
        </div>
      </div>

      <!-- Hidden Audio Element -->
      <audio id="audioPlayer" crossorigin="anonymous"></audio>
    </div>

    <!-- Playlists -->
    <div class="ap-playlists">
      <h2 class="ap-playlists-title">Playlists</h2>
      <div class="playlist-tabs">
        <button class="playlist-tab active" onclick="switchPlaylist('all')">All Tracks</button>
      </div>

      <!-- All Tracks Playlist -->
      <div id="all" class="tracks-list active"></div>
    </div>
  </div>

  <script>
    // Configuration
    const BUCKET_URL = 'https://45c7ee707fc177ad2a1fa8c3453ce346.r2.cloudflarestorage.com/audio-mixes';
    
    // Audio Player State
    let audio = document.getElementById('audioPlayer');
    let currentPlaylist = 'all';
    let currentTrackIndex = 0;
    let isPlaying = false;
    let playlists = { all: [] };

    // Initialize
    loadTracks();

    // Load tracks from S3 XML listing
    async function loadTracks() {
      try {
        const response = await fetch(BUCKET_URL + '/?list-type=2');
        const xmlText = await response.text();
        
        // Parse S3 XML response
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
        
        const contents = xmlDoc.getElementsByTagName('Contents');
        playlists.all = [];

        for (let i = 0; i < contents.length; i++) {
          const key = contents[i].getElementsByTagName('Key')[0]?.textContent;
          const size = parseInt(contents[i].getElementsByTagName('Size')[0]?.textContent || 0);
          
          if (key && size > 0 && (key.endsWith('.mp3') || key.endsWith('.m4a') || key.endsWith('.wav'))) {
            const filename = key.split('/').pop();
            const duration = await getAudioDuration(`${BUCKET_URL}/${key}`);
            
            playlists.all.push({
              name: decodeURIComponent(filename).replace(/\.[^/.]+$/, '').replace(/[-_]/g, ' '),
              artist: 'Derrick Files Studio',
              url: `${BUCKET_URL}/${key}`,
              duration: duration,
              id: `track-${i}`
            });
          }
        }

        renderPlaylist('all');
        updateStatus('Connected', false);
      } catch (error) {
        console.error('Failed to load tracks:', error);
        // Fallback: show manual instructions
        document.getElementById('all').innerHTML = `
          <div style="padding: 20px; text-align: center; color: var(--muted2);">
            <p>⏳ Loading tracks from Cloudflare R2...</p>
            <p style="font-size: 0.8rem; margin-top: 10px;">Make sure your bucket has public read access enabled.</p>
          </div>
        `;
        updateStatus('Connecting...', true);
      }
    }

    // Get audio duration
    async function getAudioDuration(url) {
      return new Promise((resolve) => {
        const tempAudio = new Audio();
        tempAudio.addEventListener('loadedmetadata', () => {
          resolve(tempAudio.duration);
        }, { once: true });
        tempAudio.addEventListener('error', () => resolve(180), { once: true }); // Default 3 min
        tempAudio.src = url;
      });
    }

    // Update status
    function updateStatus(text, isLoading) {
      const badge = document.getElementById('statusBadge');
      if (isLoading) {
        badge.className = 'status-badge loading';
        badge.innerHTML = `<span class="loading-spinner" style="margin-right: 6px; vertical-align: -2px;"></span>${text}`;
      } else {
        badge.className = 'status-badge';
        badge.innerHTML = `✓ ${text}`;
      }
    }

    // Render playlist
    function renderPlaylist(folderName) {
      const container = document.getElementById(folderName);
      const tracks = playlists[folderName];

      if (tracks.length === 0) {
        container.innerHTML = `
          <div style="padding: 20px; text-align: center; color: var(--muted2);">
            <p>No tracks found</p>
            <p style="font-size: 0.8rem; margin-top: 10px;">Upload MP3 files to your R2 bucket.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = tracks.map((track, idx) => `
        <div class="track-item" onclick="playTrack('${folderName}', ${idx})">
          <div class="track-number">${idx + 1}</div>
          <div class="track-info">
            <div class="track-name">${track.name}</div>
            <div class="track-artist">${track.artist}</div>
          </div>
          <div class="track-duration">${formatTime(track.duration)}</div>
          <div class="track-play-icon">▶</div>
        </div>
      `).join('');
    }

    // Play track
    function playTrack(playlist, index) {
      currentPlaylist = playlist;
      currentTrackIndex = index;
      const track = playlists[playlist][index];

      audio.src = track.url;
      audio.play();
      isPlaying = true;

      updateUI();
      document.getElementById('visualizer').style.display = 'flex';

      // Update now playing
      document.getElementById('npTrack').textContent = track.name;
      document.getElementById('npArtist').textContent = track.artist;
    }

    // Switch playlist
    function switchPlaylist(playlist) {
      currentPlaylist = playlist;
      document.querySelectorAll('.playlist-tab').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase().includes(playlist));
      });
      document.querySelectorAll('.tracks-list').forEach(list => {
        list.classList.remove('active');
      });
      document.getElementById(playlist).classList.add('active');
    }

    // Play/Pause
    document.getElementById('playBtn').addEventListener('click', () => {
      if (playlists[currentPlaylist].length === 0) {
        alert('No tracks loaded. Please wait for playlists to load.');
        return;
      }
      if (isPlaying) {
        audio.pause();
      } else {
        if (!audio.src) {
          playTrack(currentPlaylist, 0);
        } else {
          audio.play();
        }
      }
    });

    // Update UI on play/pause
    audio.addEventListener('play', () => {
      isPlaying = true;
      updateUI();
      document.getElementById('visualizer').style.display = 'flex';
    });

    audio.addEventListener('pause', () => {
      isPlaying = false;
      updateUI();
    });

    // Update progress
    audio.addEventListener('timeupdate', () => {
      const percent = (audio.currentTime / audio.duration) * 100;
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      document.getElementById('duration').textContent = formatTime(audio.duration);
    });

    // Auto-play next
    audio.addEventListener('ended', () => {
      const playlist = playlists[currentPlaylist];
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      playTrack(currentPlaylist, currentTrackIndex);
    });

    // Next/Prev
    document.getElementById('nextBtn').addEventListener('click', () => {
      const playlist = playlists[currentPlaylist];
      if (playlist.length === 0) return;
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      playTrack(currentPlaylist, currentTrackIndex);
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      const playlist = playlists[currentPlaylist];
      if (playlist.length === 0) return;
      currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
      playTrack(currentPlaylist, currentTrackIndex);
    });

    // Volume
    document.getElementById('volumeSlider').addEventListener('input', (e) => {
      audio.volume = e.target.value / 100;
    });

    // Progress bar seek
    document.getElementById('progressBar').addEventListener('click', (e) => {
      const rect = e.target.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      audio.currentTime = percent * audio.duration;
    });

    // Update UI
    function updateUI() {
      const tracks = document.querySelectorAll('.track-item');
      tracks.forEach((el, idx) => {
        el.classList.toggle('playing', idx === currentTrackIndex && isPlaying);
      });

      const icon = document.getElementById('playBtn').querySelector('svg');
      if (isPlaying) {
        icon.innerHTML = '<path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>';
      } else {
        icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      }

      const cover = document.getElementById('npCover');
      if (isPlaying) {
        cover.classList.add('playing');
      } else {
        cover.classList.remove('playing');
      }
    }

    // Format time
    function formatTime(seconds) {
      if (!seconds || isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
  </script>
</body>
</html>
